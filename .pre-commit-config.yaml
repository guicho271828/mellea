exclude: ^(scratchpad/)

repos:
  - repo: local
    hooks:
      # Moving ruff hooks to the local version allows for different behavior locally and in ci/cd pipelines.
      - id: ruff-format
        name: "Ruff formatter"
        entry: bash -c 'if [ "$CICD" = "1" ]; then ruff format --check --diff --quiet --config=pyproject.toml "$@"; else ruff format --quiet --config=pyproject.toml "$@"; fi' --
        language: system
        types_or: [python, jupyter]
      - id: ruff
        name: "Ruff linter"
        entry: bash -c 'if [ "$CICD" = "1" ]; then ruff check --no-fix --show-fixes --quiet --config=pyproject.toml "$@"; else ruff check --exit-non-zero-on-fix --fix --quiet --config=pyproject.toml "$@"; fi' --
        language: system
        types_or: [python, jupyter]

  - repo: local
    hooks:
      - id: mypy
        name: MyPy
        entry: uv run --no-sync mypy --install-types --non-interactive . --exclude scratchpad/ --exclude tmp/
        pass_filenames: false
        language: system
        types_or: [python, jupyter]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.7.8
    hooks:
      - id: uv-lock

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        name: markdownlint (docs)
        args: [--config, docs/docs/.markdownlint.json]
        files: ^docs/docs/.*\.md$

  # Docs validation hooks — skip gracefully when generated docs are not present
  - repo: local
    hooks:
      - id: docs-mdx-validate
        name: Validate generated MDX docs
        entry: bash -c 'test -d docs/docs/api && uv run --no-sync python tooling/docs-autogen/validate.py docs/docs/api --skip-coverage || true'
        language: system
        pass_filenames: false
        files: (docs/docs/.*\.mdx$|tooling/docs-autogen/)
      # TODO(#616): Move to normal commit flow once docstring quality issues reach 0.
      # Griffe loads the full package (~10s), so this is manual-only for now to avoid
      # slowing down every Python commit. Re-enable (remove stages: [manual]) and add
      # --fail-on-quality once quality issues are resolved.
      - id: docs-docstring-quality
        name: Audit docstring quality (informational)
        entry: bash -c 'test -d docs/docs/api && uv run --no-sync python tooling/docs-autogen/audit_coverage.py --quality --docs-dir docs/docs/api || true'
        language: system
        pass_filenames: false
        files: (mellea/.*\.py$|cli/.*\.py$)
        stages: [manual]
